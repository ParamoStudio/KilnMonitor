<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Páramo — Kiln Journal</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:opsz,wght@9..144,300;9..144,400&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
:root {
  --bg:#f4f1ed; --surface:rgba(255,255,255,0.55); --surface2:rgba(255,255,255,0.78);
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
  --text:#0f0d08; --text-soft:#2a2620; --muted:#635b50; --dimmer:#9a9286;
  --accent:#d8421a; --mono:'DM Mono',monospace; --serif:'Fraunces',serif;
  --input-bg:rgba(255,255,255,0.65); --r-pill:999px; --r-card:14px;
}
body.dark {
  --bg:#14110d; --surface:rgba(48,42,32,0.65); --surface2:rgba(58,50,38,0.85);
  --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.20);
  --text:#fff8e8; --text-soft:#e8e0d0; --muted:#b8b0a0; --dimmer:#807868;
  --accent:#ff7040; --input-bg:rgba(255,255,255,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);-webkit-font-smoothing:antialiased;overflow:hidden;}
#blob-canvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:0.025;pointer-events:none;z-index:1;}

.stage{position:relative;z-index:2;width:100%;height:100vh;height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;box-sizing:border-box;}
.panel{width:100%;max-width:860px;height:100%;display:flex;flex-direction:column;background:var(--surface2);border:1px solid var(--border2);border-radius:28px;backdrop-filter:blur(40px) saturate(1.6);-webkit-backdrop-filter:blur(40px) saturate(1.6);box-shadow:0 8px 48px rgba(0,0,0,.10),0 2px 12px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.55);opacity:0;transform:scale(0.96) translateY(12px);animation:panelIn 0.45s cubic-bezier(.16,1,.3,1) 0.05s forwards;}
body.dark .panel{box-shadow:0 8px 48px rgba(0,0,0,.35),0 2px 12px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.08);}
@keyframes panelIn{to{opacity:1;transform:none;}}

/* HEADER */
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 0;flex-shrink:0;gap:8px;}
.header-left{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.panel-wordmark{font-family:var(--serif);font-weight:300;font-size:1.05rem;color:var(--muted);flex-shrink:0;}
.header-right{display:flex;align-items:center;gap:5px;}

/* PILLS */
.pill-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--r-pill);border:1px solid var(--border2);background:var(--input-bg);font-family:var(--mono);font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:color .15s;white-space:nowrap;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.pill-btn:hover{color:var(--text);}
.pill-btn.active{color:var(--text);border-color:var(--accent);}
.panel-back{padding:5px 10px;border-radius:var(--r-pill);border:1px solid var(--border2);background:var(--input-bg);font-family:var(--mono);font-size:0.68rem;color:var(--dimmer);cursor:pointer;transition:color .15s;white-space:nowrap;backdrop-filter:blur(12px);}
.panel-back:hover{color:var(--text);}
.hdd-chevron{font-size:0.55rem;opacity:0.6;}

/* LANG DROPDOWN */
.hdd-wrap{position:relative;}
.hdd-menu{position:absolute;top:calc(100% + 6px);right:0;left:auto;background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:6px;min-width:90px;backdrop-filter:blur(32px) saturate(1.4);-webkit-backdrop-filter:blur(32px) saturate(1.4);box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:500;display:none;animation:menuIn .2s cubic-bezier(.16,1,.3,1);}
.hdd-menu.open{display:block;}
.hdd-wrap{position:relative;}
@keyframes menuIn{from{opacity:0;transform:translateY(-6px) scale(.97);}to{opacity:1;transform:none;}}
.hdd-item{display:block;width:100%;padding:7px 12px;border-radius:8px;border:none;background:none;font-family:var(--mono);font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-soft);cursor:pointer;text-align:left;transition:background .12s;}
.hdd-item:hover{background:var(--input-bg);}
.hdd-item.active{color:var(--accent);}

/* IMPORT MENU */
.import-wrap{position:relative;}
.import-menu{position:absolute;top:calc(100% + 6px);right:0;left:auto;background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:6px;min-width:190px;backdrop-filter:blur(32px) saturate(1.4);-webkit-backdrop-filter:blur(32px) saturate(1.4);box-shadow:0 8px 32px rgba(0,0,0,.12);z-index:500;display:none;animation:menuIn .2s cubic-bezier(.16,1,.3,1);}
.import-menu.open{display:block;}
.import-item{display:block;width:100%;padding:8px 12px;border-radius:8px;border:none;background:none;font-family:var(--mono);font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-soft);cursor:pointer;text-align:left;transition:background .12s;}
.import-item:hover{background:var(--input-bg);}
.import-item.muted{color:var(--dimmer);}
.import-sep{height:1px;background:var(--border);margin:4px 0;}
.import-hint{padding:5px 12px 3px;font-size:0.56rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--dimmer);}

/* CLOUD PILL */
.cloud-pill{display:flex;align-items:center;gap:5px;font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--dimmer);padding:3px 8px;border-radius:var(--r-pill);border:1px solid var(--border);}
.cloud-dot{width:5px;height:5px;border-radius:50%;background:var(--dimmer);}
.cloud-dot.on{background:#4caf50;}

/* DIVIDER */
.panel-divider{height:1px;background:var(--border);margin:16px 24px 0;flex-shrink:0;}

/* TITLE */
.panel-title-row{padding:20px 28px 0;flex-shrink:0;}
.panel-title{font-family:var(--serif);font-weight:300;font-size:1.9rem;color:var(--text);}
.panel-count{font-size:0.62rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--accent);margin-top:4px;}

/* FILTERS */
.filters{padding:16px 28px 0;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;}
.filter-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;}
.filter-label{font-size:0.56rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--dimmer);}
.filter-row{display:flex;gap:4px;}
.filter-input{flex:1;min-width:0;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-family:var(--mono);font-size:0.72rem;color:var(--text);outline:none;transition:border-color .15s;}
.filter-input:focus{border-color:var(--border2);}
.filter-input::placeholder{color:var(--dimmer);}
.filter-select{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-family:var(--mono);font-size:0.72rem;color:var(--text);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;}
.filter-select option{background:var(--bg);}
.filter-clear{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:none;font-family:var(--mono);font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--dimmer);cursor:pointer;white-space:nowrap;align-self:flex-end;transition:color .15s;}
.filter-clear:hover{color:var(--text);}

/* LIST */
.panel-body{flex:1;min-height:0;overflow-y:auto;padding:16px 28px 24px;scrollbar-width:thin;scrollbar-color:var(--border2) transparent;}
.panel-body::-webkit-scrollbar{width:4px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.firing-list{display:flex;flex-direction:column;gap:8px;}
.firing-card{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;padding:14px 18px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--r-card);cursor:pointer;transition:border-color .18s,background .18s,transform .18s;backdrop-filter:blur(8px);animation:cardIn .3s cubic-bezier(.16,1,.3,1) both;}
.firing-card:hover{border-color:var(--border2);background:var(--surface2);transform:translateY(-1px);}
@keyframes cardIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.firing-date{font-size:.7rem;color:var(--dimmer);white-space:nowrap;min-width:80px;}
.firing-info{display:flex;flex-direction:column;gap:3px;min-width:0;}
.firing-name{font-size:.82rem;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.firing-meta{display:flex;gap:10px;font-size:.65rem;color:var(--muted);}
.firing-note-preview{font-size:.65rem;color:var(--dimmer);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.firing-temp{font-family:var(--serif);font-size:1.3rem;font-weight:300;color:var(--accent);white-space:nowrap;}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;text-align:center;}
.empty-icon{font-size:2.5rem;opacity:.25;}
.empty-title{font-family:var(--serif);font-weight:300;font-size:1.4rem;color:var(--text-soft);}
.empty-sub{font-size:.72rem;color:var(--dimmer);line-height:1.6;max-width:36ch;}
.empty-actions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center;}
.btn-primary{padding:8px 18px;border-radius:var(--r-pill);border:none;background:var(--accent);color:#fff;font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:opacity .15s;}
.btn-primary:hover{opacity:.85;}
.btn-outline{padding:8px 18px;border-radius:var(--r-pill);border:1px solid var(--border2);background:none;color:var(--muted);font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:color .15s;}
.btn-outline:hover{color:var(--text);}

/* FOOTER */
.panel-footer{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 24px 16px;border-top:1px solid var(--border);}
.footer-pill{display:flex;align-items:center;gap:5px;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--border2);border-radius:var(--r-pill);padding:4px 12px;font-family:var(--mono);cursor:pointer;transition:color .15s,border-color .15s;text-decoration:none;white-space:nowrap;}
.footer-pill:hover{color:var(--text);border-color:var(--accent);}
.footer-sep{width:3px;height:3px;border-radius:50%;background:var(--muted);opacity:.4;flex-shrink:0;}

/* OVERLAY */
.overlay-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .3s;}
.overlay-backdrop.visible{opacity:1;pointer-events:all;}
.overlay-card{background:var(--surface2);border:1px solid var(--border2);border-radius:24px;width:100%;max-width:720px;max-height:90vh;display:flex;flex-direction:column;backdrop-filter:blur(40px) saturate(1.4);-webkit-backdrop-filter:blur(40px) saturate(1.4);box-shadow:0 24px 80px rgba(0,0,0,.18);transform:scale(.94) translateY(16px);transition:transform .35s cubic-bezier(.16,1,.3,1);overflow:hidden;}
.overlay-backdrop.visible .overlay-card{transform:scale(1) translateY(0);}
.overlay-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--border);flex-shrink:0;gap:12px;}
.overlay-title{font-family:var(--serif);font-size:1.3rem;font-weight:300;color:var(--text);line-height:1.2;flex:1;}
.overlay-close{background:none;border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-size:.85rem;cursor:pointer;padding:4px 10px;font-family:var(--mono);transition:color .15s;}
.overlay-close:hover{color:var(--text);}
.overlay-body{flex:1;min-height:0;overflow-y:auto;padding:20px 22px 22px;display:flex;flex-direction:column;gap:18px;scrollbar-width:thin;}
.overlay-chart{background:var(--input-bg);border:1px solid var(--border);border-radius:14px;height:220px;position:relative;overflow:hidden;flex-shrink:0;}
.overlay-chart canvas{width:100%;height:100%;}
.overlay-chart-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.72rem;color:var(--dimmer);letter-spacing:.14em;text-transform:uppercase;}
.overlay-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.stat-block{background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.stat-label{font-size:.58rem;letter-spacing:.24em;text-transform:uppercase;color:var(--dimmer);margin-bottom:4px;}
.stat-value{font-size:.92rem;color:var(--text);font-weight:500;}
.overlay-note{background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
.overlay-note-label{font-size:.58rem;letter-spacing:.24em;text-transform:uppercase;color:var(--dimmer);margin-bottom:8px;}
.overlay-note-text{font-size:.82rem;color:var(--text-soft);line-height:1.65;white-space:pre-wrap;}
.overlay-actions{display:flex;justify-content:flex-end;gap:8px;}

/* RESPONSIVE */
@media(max-width:1024px) and (min-width:601px){.stage{padding:24px 20px;}}
@media(max-width:600px){
  .stage{padding:12px;}
  .panel{border-radius:20px;}
  .panel-header{padding:12px 14px 0;flex-wrap:wrap;gap:6px;}
  .header-left{width:100%;}
  .header-right{width:100%;flex-wrap:wrap;gap:4px;}
  .panel-title-row{padding:12px 16px 0;}
  .panel-title{font-size:1.4rem;}
  .filters{padding:10px 16px 0;gap:6px;}
  .filter-group{min-width:100px;}
  .panel-body{padding:10px 16px 16px;}
  .firing-card{grid-template-columns:1fr auto;gap:8px;}
  .firing-date{display:none;}
  .overlay-stats{grid-template-columns:repeat(2,1fr);}
  .pill-btn{padding:4px 8px;font-size:.58rem;letter-spacing:.1em;}
  html,body{overflow-y:auto;height:auto;}
}
@media(max-width:380px){.cloud-pill{display:none;}}
</style>
</head>
<body>
<canvas id="blob-canvas"></canvas>

<div class="stage"><div class="panel">

  <!-- HEADER -->
  <div class="panel-header">
    <div class="header-left">
      <span class="panel-wordmark">Páramo</span>
      <div class="cloud-pill"><div class="cloud-dot" id="cloud-dot"></div><span id="cloud-status-label">No cloud</span></div>
    </div>
    <div class="header-right">
      <button class="pill-btn" id="theme-btn" onclick="toggleTheme()">☽</button>

      <!-- Lang dropdown — same as index.html -->
      <div class="hdd-wrap" id="hdd-lang-wrap">
        <button class="pill-btn" id="hdd-lang-btn" onclick="hddLangToggle()">
          <span id="hdd-lang-label">EN</span><span class="hdd-chevron">▾</span>
        </button>
        <div class="hdd-menu" id="hdd-lang-menu" role="menu"></div>
      </div>

      <!-- Import dropdown -->
      <div class="import-wrap" id="import-wrap">
        <button class="pill-btn" id="import-btn" onclick="toggleImportMenu()">
          <span id="str-import-label">↑ Import</span><span class="hdd-chevron">▾</span>
        </button>
        <div class="import-menu" id="import-menu">
          <div class="import-hint" id="str-local-hint">Local</div>
          <button class="import-item" id="str-load-files-btn" onclick="importFiles()">↓ Load files</button>
          <div class="import-sep"></div>
          <div class="import-hint" id="str-cloud-hint">Cloud</div>
          <button class="import-item muted" onclick="connectGoogleDrive()" id="str-connect-drive">☁ Connect Google Drive</button>
        </div>
      </div>

      <button class="panel-back" onclick="window.close()" id="str-back-btn">← Kiln monitor</button>
    </div>
  </div>

  <div class="panel-divider"></div>

  <!-- TITLE -->
  <div class="panel-title-row">
    <div class="panel-title" id="str-journal-title">Kiln Journal</div>
    <div class="panel-count" id="panel-count">No firings loaded</div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <div class="filter-group">
      <div class="filter-label" id="lbl-date">Date range</div>
      <div class="filter-row">
        <input class="filter-input" id="f-date-from" type="date" onchange="applyFilters()">
        <input class="filter-input" id="f-date-to"   type="date" onchange="applyFilters()">
      </div>
    </div>
    <div class="filter-group" style="max-width:180px;">
      <div class="filter-label" id="lbl-temp">Max temp (°C)</div>
      <div class="filter-row">
        <input class="filter-input" id="f-temp-min" type="number" placeholder="Min" min="0" max="1400" onchange="applyFilters()">
        <input class="filter-input" id="f-temp-max" type="number" placeholder="Max" min="0" max="1400" onchange="applyFilters()">
      </div>
    </div>
    <div class="filter-group" style="max-width:160px;">
      <div class="filter-label" id="lbl-dur">Duration (h)</div>
      <div class="filter-row">
        <input class="filter-input" id="f-dur-min" type="number" placeholder="Min" min="0" step="0.5" onchange="applyFilters()">
        <input class="filter-input" id="f-dur-max" type="number" placeholder="Max" min="0" step="0.5" onchange="applyFilters()">
      </div>
    </div>
    <div class="filter-group" style="max-width:140px;">
      <div class="filter-label" id="lbl-type">Type</div>
      <div class="filter-row">
        <select class="filter-select" id="f-mode" onchange="applyFilters()">
          <option value="">All types</option>
        </select>
      </div>
    </div>
    <button class="filter-clear" id="str-filter-clear" onclick="clearFilters()">Clear</button>
  </div>

  <!-- LIST -->
  <div class="panel-body">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">◎</div>
      <div class="empty-title" id="str-empty-title">No firings yet</div>
      <div class="empty-sub"   id="str-empty-sub">Load your exported JSON files to browse your firing history.</div>
      <div class="empty-actions">
        <button class="btn-primary" id="str-empty-load"  onclick="importFiles()">↓ Load files</button>
        <button class="btn-outline"  id="str-empty-cloud" onclick="connectGoogleDrive()">☁ Connect cloud</button>
      </div>
    </div>
    <div class="firing-list" id="firing-list" style="display:none;"></div>
  </div>

  <!-- FOOTER -->
  <div class="panel-footer">
    <a class="footer-pill" href="info.html?tab=contact" target="_blank">✉ <span id="str-footer-contact">Contact</span></a>
    <div class="footer-sep"></div>
    <a class="footer-pill" href="info.html?tab=guide" target="_blank">◎ <span id="str-footer-guide">Guide</span></a>
    <div class="footer-sep"></div>
    <a class="footer-pill" href="info.html?tab=licence" target="_blank">⊙ <span id="str-footer-licence">Licence</span></a>
  </div>

</div></div>

<!-- OVERLAY -->
<div class="overlay-backdrop" id="overlay-backdrop" onclick="closeOverlay(event)">
  <div class="overlay-card">
    <div class="overlay-header">
      <div class="overlay-title" id="overlay-title">—</div>
      <button class="overlay-close" onclick="closeOverlayDirect()">✕</button>
    </div>
    <div class="overlay-body">
      <div class="overlay-chart">
        <canvas id="overlay-canvas"></canvas>
        <div class="overlay-chart-empty" id="overlay-chart-empty" style="display:none;">No datapoints</div>
      </div>
      <div class="overlay-stats">
        <div class="stat-block"><div class="stat-label" id="str-stat-temp">Max temp</div><div class="stat-value" id="stat-maxtemp">—</div></div>
        <div class="stat-block"><div class="stat-label" id="str-stat-dur">Duration</div><div class="stat-value" id="stat-duration">—</div></div>
        <div class="stat-block"><div class="stat-label" id="str-stat-pts">Datapoints</div><div class="stat-value" id="stat-points">—</div></div>
        <div class="stat-block"><div class="stat-label" id="str-stat-mode">Firing type</div><div class="stat-value" id="stat-mode">—</div></div>
      </div>
      <div class="overlay-note">
        <div class="overlay-note-label" id="str-notes-label">Notes</div>
        <div class="overlay-note-text" id="overlay-note-text">—</div>
      </div>
      <div class="overlay-actions">
        <button class="btn-outline" id="str-share-png" onclick="exportOverlayPng()">↓ Share chart (PNG)</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" multiple accept=".json" style="display:none" onchange="handleFiles(this.files)">

<script>
'use strict';

let allFirings = [], filtered = [], activeFiring = null;

async function loadLangFile(code) {
  if (_langCache[code]) { _applyStrings(_langCache[code]); return; }
  try {
    const res = await fetch(LANG_BASE_URL + code + '.json');
    if (!res.ok) throw new Error('');
    const data = await res.json();
    _langCache[code] = data; _applyStrings(data);
  } catch(e) { _applyStrings(STRINGS[code] || STRINGS.en); }
}

function handleFiles(files) { if (files && files.length) readFiles(Array.from(files)); }
function readFiles(files) {
  Promise.all(files.map(file => new Promise(res => {
    const r = new FileReader();
    r.onload = e => { try { const d = JSON.parse(e.target.result); res((d&&d.meta&&d.datapoints)?{...d,_filename:file.name}:null); } catch{ res(null); } };
    r.readAsText(file);
  }))).then(results => {
    results.filter(Boolean).forEach(f => { if (!allFirings.some(x => x.meta.exportedAt === f.meta.exportedAt)) allFirings.push(f); });
    allFirings.sort((a,b) => b.meta.startedAt - a.meta.startedAt);
    rebuildTypeFilter();
    applyFilters();
  });
}

function connectGoogleDrive() {
  document.getElementById('import-menu').classList.remove('open');
  document.getElementById('import-btn').classList.remove('active');
  if (driveConnected) {
    if (confirm('Disconnect Google Drive?')) {
      driveToken = null; driveFolderId = null;
      localStorage.removeItem(DRIVE_TOKEN_KEY);
      localStorage.removeItem(DRIVE_FOLDER_KEY);
      setDriveStatus(false);
      renderList();
    }
    return;
  }
  gapi.load('client', async () => {
    await gapi.client.init({});
    const tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: DRIVE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: async (resp) => {
        if (resp.error) { console.error('Drive auth:', resp.error); return; }
        driveToken = resp.access_token;
        localStorage.setItem(DRIVE_TOKEN_KEY, driveToken);
        setDriveStatus(true, 'Connecting…');
        driveFolderId = await getOrCreateFolder();
        if (driveFolderId) {
          localStorage.setItem(DRIVE_FOLDER_KEY, driveFolderId);
          setDriveStatus(true, 'Drive');
          await loadFromDrive();
        }
      }
    });
    tokenClient.requestAccessToken({ prompt: 'consent' });
  });
}

async function getOrCreateFolder() {
  const q = encodeURIComponent(`name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
  const res = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
  if (!res) return null;
  if (res.files && res.files.length > 0) return res.files[0].id;
  const created = await driveRequest('https://www.googleapis.com/drive/v3/files', 'POST', { name: FOLDER_NAME, mimeType: 'application/vnd.google-apps.folder' });
  return created ? created.id : null;
}

async function loadFromDrive() {
  if (!driveFolderId || !driveToken) return;
  const q = encodeURIComponent(`'${driveFolderId}' in parents and mimeType='application/json' and trashed=false`);
  const res = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&orderBy=name`);
  if (!res || !res.files || !res.files.length) return;
  const fetches = res.files.map(f =>
    driveRequest(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`)
      .then(data => data && data.meta && data.datapoints ? { ...data, _filename: f.name, _driveId: f.id } : null)
      .catch(() => null)
  );
  const results = (await Promise.all(fetches)).filter(Boolean);
  results.forEach(f => { if (!allFirings.some(x => x.meta.exportedAt === f.meta.exportedAt)) allFirings.push(f); });
  allFirings.sort((a, b) => b.meta.startedAt - a.meta.startedAt);
  rebuildTypeFilter();
  applyFilters();
}

async function driveRequest(url, method = 'GET', body = null) {
  if (!driveToken) return null;
  const opts = { method, headers: { 'Authorization': 'Bearer ' + driveToken, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(url, opts);
    if (res.status === 401) { driveToken = null; localStorage.removeItem(DRIVE_TOKEN_KEY); setDriveStatus(false); return null; }
    if (!res.ok) return null;
    const ct = res.headers.get('content-type') || '';
    return ct.includes('application/json') ? res.json() : res.json().catch(() => res.text());
  } catch(e) { return null; }
}

async function tryAutoReconnect() {
  if (!driveToken) return;
  const res = await driveRequest('https://www.googleapis.com/drive/v3/about?fields=user');
  if (res) {
    setDriveStatus(true, 'Drive');
    if (!driveFolderId) { driveFolderId = await getOrCreateFolder(); if (driveFolderId) localStorage.setItem(DRIVE_FOLDER_KEY, driveFolderId); }
    if (driveFolderId) await loadFromDrive();
  } else {
    driveToken = null; localStorage.removeItem(DRIVE_TOKEN_KEY); setDriveStatus(false);
  }
}

// DYNAMIC TYPE FILTER — uses modeLabel (user-customized name) for both display and filtering
function rebuildTypeFilter() {
  const sel = document.getElementById('f-mode');
  const cur = sel.value;
  // Collect unique modeLabel values — this is what the user actually named their firing type
  const labels = [...new Set(allFirings.map(f => f.meta.modeLabel || f.meta.mode).filter(Boolean))].sort();
  sel.innerHTML = `<option value="">${t('allTypes')}</option>`;
  labels.forEach(label => {
    const opt = document.createElement('option');
    opt.value = label;
    opt.textContent = label;
    sel.appendChild(opt);
  });
  if (labels.includes(cur)) sel.value = cur;
}

// FILTERS
function applyFilters() {
  const dateFrom = document.getElementById('f-date-from').value;
  const dateTo   = document.getElementById('f-date-to').value;
  const tempMin  = parseFloat(document.getElementById('f-temp-min').value);
  const tempMax  = parseFloat(document.getElementById('f-temp-max').value);
  const durMin   = parseFloat(document.getElementById('f-dur-min').value);
  const durMax   = parseFloat(document.getElementById('f-dur-max').value);
  const mode     = document.getElementById('f-mode').value;
  filtered = allFirings.filter(f => {
    const m = f.meta, date = m.startedAt ? new Date(m.startedAt) : null;
    if (dateFrom && date && date < new Date(dateFrom)) return false;
    if (dateTo   && date && date > new Date(dateTo+'T23:59:59')) return false;
    if (!isNaN(tempMin) && m.maxTemp_c < tempMin) return false;
    if (!isNaN(tempMax) && m.maxTemp_c > tempMax) return false;
    const durH = (m.duration_min||0)/60;
    if (!isNaN(durMin) && durH < durMin) return false;
    if (!isNaN(durMax) && durH > durMax) return false;
    if (mode && (f.meta.modeLabel || f.meta.mode) !== mode) return false;
    return true;
  });
  renderList();
}
function clearFilters() {
  ['f-date-from','f-date-to','f-temp-min','f-temp-max','f-dur-min','f-dur-max'].forEach(id => { document.getElementById(id).value=''; });
  document.getElementById('f-mode').value = '';
  applyFilters();
}

  if (!allFirings.length) {
    list.style.display='none'; empty.style.display='';
    count.textContent = t('noFirings');
    document.getElementById('str-empty-title').textContent = t('noFiringsYet');
    document.getElementById('str-empty-sub').textContent   = t('noFiringsMsg');
    document.querySelector('.empty-actions').style.display = '';
    const cloudBtn = document.getElementById('str-empty-cloud');
    if (cloudBtn) cloudBtn.textContent = driveConnected ? '✓ Disconnect Drive' : t('connectCloud');
    return;
  }
  const show = filtered;
  if (!show.length) {
    list.style.display='none'; empty.style.display='';
    document.getElementById('str-empty-title').textContent = t('noMatches');
    document.getElementById('str-empty-sub').textContent   = t('noMatchesMsg');
    document.querySelector('.empty-actions').style.display = 'none';
    count.textContent = allFirings.length + ' loaded — 0 match';
    return;
  }
  list.style.display='flex'; empty.style.display='none';
  count.textContent = show.length + (show.length!==1?' firings':' firing') + (show.length<allFirings.length?' (filtered from '+allFirings.length+')':'');
  list.innerHTML='';
  show.forEach((f,i) => {
    const m=f.meta;
    const date = m.startedAt ? new Date(m.startedAt).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'}) : '—';
    const dur  = m.duration_min ? (m.duration_min<60?Math.round(m.duration_min)+'m':Math.floor(m.duration_min/60)+'h'+(m.duration_min%60?(m.duration_min%60)+'m':'')) : '—';
    const card = document.createElement('div');
    card.className='firing-card'; card.style.animationDelay=(i*.04)+'s';
    card.innerHTML=`
      <div class="firing-date">${esc(date)}</div>
      <div class="firing-info">
        <div class="firing-name">${esc(m.kilnName||'Unnamed kiln')}</div>
        <div class="firing-meta"><span>${esc(m.modeLabel||m.mode||'—')}</span><span>${dur}</span><span>${(f.datapoints||[]).length} pts</span></div>
        ${m.note?`<div class="firing-note-preview">${esc(m.note)}</div>`:''}
      </div>
      <div class="firing-temp">${m.maxTemp_c!=null?Math.round(m.maxTemp_c)+'°':'—'}</div>`;
    card.onclick=()=>openOverlay(f);
    list.appendChild(card);
  });
}

// CHART
function drawOverlayChart(dp) {
  const canvas=document.getElementById('overlay-canvas');
  const empty=document.getElementById('overlay-chart-empty');
  const ctx=canvas.getContext('2d'), wrap=canvas.parentElement;
  const DPR=Math.min(window.devicePixelRatio||1,2);
  const W=wrap.offsetWidth*DPR, H=wrap.offsetHeight*DPR;
  canvas.width=W; canvas.height=H;
  canvas.style.width=wrap.offsetWidth+'px'; canvas.style.height=wrap.offsetHeight+'px';
  if(!dp||dp.length<2){empty.style.display='flex';return;}
  empty.style.display='none';
  const isDark=document.body.classList.contains('dark');
  const pL=46*DPR,pR=16*DPR,pT=14*DPR,pB=28*DPR,cw=W-pL-pR,ch=H-pT-pB;
  const temps=dp.map(d=>d.tc).filter(v=>!isNaN(v)), tMax=Math.max(...temps,100);
  const t0=dp[0].ts, t1=dp[dp.length-1].ts, tSpan=(t1-t0)/60000||1;
  const xC=ts=>pL+((ts-t0)/60000/tSpan)*cw, yC=tc=>pT+(1-tc/tMax)*ch;
  ctx.fillStyle=isDark?'rgba(30,24,16,0.6)':'rgba(255,255,255,0.4)'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.05)'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pT+(ch*i)/4;ctx.beginPath();ctx.moveTo(pL,y);ctx.lineTo(W-pR,y);ctx.stroke();}
  const grad=ctx.createLinearGradient(0,pT,0,pT+ch);
  grad.addColorStop(0,isDark?'rgba(255,112,64,0.35)':'rgba(216,66,26,0.25)');grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();dp.forEach((d,i)=>{i===0?ctx.moveTo(xC(d.ts),yC(d.tc)):ctx.lineTo(xC(d.ts),yC(d.tc));});
  ctx.lineTo(xC(t1),pT+ch);ctx.lineTo(xC(t0),pT+ch);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();dp.forEach((d,i)=>{i===0?ctx.moveTo(xC(d.ts),yC(d.tc)):ctx.lineTo(xC(d.ts),yC(d.tc));});
  ctx.strokeStyle=isDark?'#ff7040':'#d8421a';ctx.lineWidth=2*DPR;ctx.lineJoin='round';ctx.stroke();
  ctx.fillStyle=isDark?'#807868':'#9a9286';ctx.font=(10*DPR)+'px DM Mono,monospace';
  ctx.textAlign='right';
  for(let i=0;i<=4;i++){ctx.fillText(Math.round(tMax*(1-i/4))+'°',pL-6*DPR,pT+(ch*i)/4+4*DPR);}
  ctx.textAlign='center';
  for(let i=0;i<=4;i++){const t=(tSpan*i)/4;const lbl=t<60?Math.round(t)+'m':(t/60).toFixed(t%60?1:0)+'h';ctx.fillText(lbl,pL+(cw*i)/4,H-8*DPR);}
}

(function(){

  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);const W=cv.width,H=cv.height;
    blobs.forEach(b=>{b.t+=.006;const x=(b.x+Math.sin(b.t*1.1)*b.ax)*W,y=(b.y+Math.cos(b.t*.85)*b.ay)*H,r=b.r*Math.min(W,H);const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,b.c+'40');g.addColorStop(.5,b.c+'1c');g.addColorStop(1,b.c+'00');ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();});
    requestAnimationFrame(draw);
  }
  draw();
})();
